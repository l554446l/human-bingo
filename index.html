<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCF Grid Bingo App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px 10px;
        }
        h1 { 
            color: #1a365d; 
            margin-bottom: 5px;
            font-size: 28px;
        }
        .description {
            color: #4a5568;
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto 20px auto;
            line-height: 1.4;
        }
        .loading {
            font-size: 18px;
            color: #4a5568;
            margin-top: 50px;
        }
        /* 5x5 Bingo Grid */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 450px;
            margin: 0 auto;
        }
        .tile {
            aspect-ratio: 1;
            background-color: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            font-size: 10px;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
            transition: transform 0.1s;
            user-select: none;
        }
        .tile:active { transform: scale(0.95); }
        .logo-tile {
            background-color: #ffffff;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: default;
        }
        .logo-tile:active { transform: none; }
        #camera-input { display: none; }
    </style>
</head>
<body>

    <div id="loading-state" class="loading">Loading Bingo Board...</div>

    <div id="game-state" style="display: none;">
        <h1 id="main-title">Loading...</h1>
        <p class="description" id="main-description"></p>
        <div class="bingo-grid" id="bingoBoard"></div>
    </div>
    
    <input type="file" id="camera-input" accept="image/*" capture="user">

    <script>
        // ⚠️ PASTE YOUR GOOGLE SHEET CSV LINK HERE
        const GOOGLE_SHEET_CSV_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vSd93onSdet2aBZxNCxpKUpIavqKQSIIOc7xDxvr4_Zo3BmtmUNxBZpoGL3XZ9FyqZjYen_ZaEumQ78/pub?output=csv;

        const board = document.getElementById('bingoBoard');
        const cameraInput = document.getElementById('camera-input');
        let activeTile = null;

        // Custom parser to split CSV lines while respecting commas inside quotes
        function parseCSVToMatrix(text) {
            let lines = [];
            let row = [];
            let cell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let nextChar = text[i+1];

                if (inQuotes) {
                    if (char === '"') {
                        if (nextChar === '"') { cell += '"'; i++; } 
                        else { inQuotes = false; }
                    } else { cell += char; }
                } else {
                    if (char === '"') { inQuotes = true; } 
                    else if (char === ',') { row.push(cell.trim()); cell = ''; } 
                    else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') { i++; }
                        row.push(cell.trim());
                        lines.push(row);
                        row = [];
                        cell = '';
                    } else { cell += char; }
                }
            }
            if (cell || row.length > 0) { row.push(cell.trim()); lines.push(row); }
            return lines;
        }

        // Fetch and map the grid matrix

            .then(response => response.text())

                // Description is at Row 3, Col B (Matrix index row 2, col 1)
                document.getElementById('main-description').innerHTML = matrix[2]?.[1] || "";

                // Generate 5x5 grid targeting Sheet Rows 5 to 9 (Indices 4 to 8)
                // and Sheet Columns B to F (Indices 1 to 5)
                for (let r = 4; r <= 8; r++) {
                    for (let c = 1; c <= 5; c++) {
                        const tile = document.createElement('div');
                        tile.classList.add('tile');
                        
                        // Check if this is the center tile (Sheet Row 7, Column D -> matrix[6][3])
                        if (r === 6 && c === 3) {
                            tile.classList.add('logo-tile');
                            
                            let logoTarget = matrix[6]?.[3] || '';
                            // Smart clean up: If it's blank, or just says a generic label like "LOGO", 
                            // fallback to the local 'logo.png' in GitHub.
                            if (!logoTarget || logoTarget.toLowerCase() === 'logo' || logoTarget === '') {
                                logoTarget = 'logo.png';
                            }
                            
                            tile.style.backgroundImage = `url('${logoTarget}')`;
                        } else {
                            // Extract clue text safely
                            tile.innerText = matrix[r]?.[c] || "";
                            
                            tile.addEventListener('click', () => {
                                activeTile = tile;
                                cameraInput.click();
                            });
                        }
                        board.appendChild(tile);
                    }
                }

                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('game-state').style.display = 'block';
            })
            .catch(err => {
                document.getElementById('loading-state').innerText = "Failed to load board data.";
                console.error(err);
            });

        // Camera capture logic
        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && activeTile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    activeTile.style.backgroundImage = `url('${event.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
            cameraInput.value = '';
        });
    </script>
</body>
</html>
