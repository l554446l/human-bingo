<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Human Bingo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin: 10px;
        }
        h1 { color: #333; }
        /* Create the 5x5 Bingo Grid */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-width: 500px;
            margin: 0 auto;
        }
        .tile {
            aspect-ratio: 1; /* Keeps tiles perfectly square */
            background-color: #ffffff;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-center: center;
            padding: 5px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            text-shadow: 1px 1px 2px white, -1px -1px 2px white; /* Keeps text readable over photos */
            transition: transform 0.1s;
        }
        .tile:active { transform: scale(0.95); }
        /* Hidden camera input */
        #camera-input { display: none; }
    </style>
</head>
<body>

    <h1>Human Bingo 📸</h1>
    <p>Tap a tile to snap a photo!</p>

    <div class="bingo-grid" id="bingoBoard"></div>
    
    <!-- The magic input that triggers the mobile camera -->
    <input type="file" id="camera-input" accept="image/*" capture="environment">

    <script>
        // Your list of 25 bingo prompts
        const prompts = [
            "Has a pet dog", "Speaks 3+ languages", "Left-handed", "Born in another state", "Can play guitar",
            "Has a tattoo", "Loves spicy food", "Is an only child", "Has broken a bone", "Wearing blue",
            "Visits the gym daily", "Loves anime", "Can whistle loudly", "FREE SPACE", "Has a cat",
            "Owns a motorcycle", "Coffee addict", "Born in the same month", "Can juggle", "Has been to Europe",
            "Plays video games", "Can cook lasagna", "Is wearing glasses", "Has a garden", "Likes pineapple on pizza"
        ];

        const board = document.getElementById('bingoBoard');
        const cameraInput = document.getElementById('camera-input');
        let activeTile = null;

        // Generate the board
        prompts.forEach((prompt) => {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.innerText = prompt;
            
            // When a tile is clicked, trigger the hidden camera input
            tile.addEventListener('click', () => {
                activeTile = tile;
                cameraInput.click();
            });
            
            board.appendChild(tile);
        });

        // When the user takes a photo, handle the file
        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && activeTile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // Set the captured photo as the background of the clicked tile
                    activeTile.style.backgroundImage = `url('${event.target.result}')`;
                    activeTile.style.color = '#000'; // Ensure text remains visible
                }
                reader.readAsDataURL(file);
            }
            // Reset input value so the camera can be triggered for the same tile if retaken
            cameraInput.value = '';
        });
    </script>
</body>
</html>
