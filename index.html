<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCF Faculty Bingo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px 10px;
        }
        h1 { 
            color: #1a365d; 
            margin-bottom: 5px;
            font-size: 28px;
        }
        .description {
            color: #4a5568;
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto 20px auto;
            line-height: 1.4;
        }
        /* 5x5 Bingo Grid */
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-width: 450px;
            margin: 0 auto;
        }
        .tile {
            aspect-ratio: 1;
            background-color: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            font-size: 10px;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            /* Text shadow keeps text highly readable over any photo background */
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
        }
        .tile:active { 
            transform: scale(0.95); 
        }
        /* Unique styling for the center logo tile */
		.logo-tile {
			background-color: #ffffff;
			background-image: url('logo.png'); /* Targets the file in your GitHub repo */
			background-size: contain;
			background-repeat: no-repeat;
			background-position: center;
			cursor: default;
		}
        .logo-tile:active {
            transform: none;
        }
        #camera-input { display: none; }
    </style>
</head>
<body>

    <h1>GCF Faculty Bingo 📸</h1>
    <p class="description">
        Find a fellow teacher or staff who matches a clue.<br>
		Tap the box, and take a <b>selfie</b> together!<br>
		First one to lock in all their matches wins!
    </p>

    <div class="bingo-grid" id="bingoBoard"></div>
    
    <!-- Hidden input to trigger the mobile camera -->
    <input type="file" id="camera-input" accept="image/*" capture="user">

    <script>
        // The 25 specific prompts arranged exactly top-to-bottom, left-to-right
        const prompts = [
            "tapos na sa course outline", 
            "single", 
            "wears white sneakers", 
            "singerist ng \"Inspire, Excel, Achieve\"", 
            "coffee lover",
            
            "5 and up years of teaching in GCF", 
            "long hair", 
            "may nalagay sa bag na cellphone ng iba", 
            "nasa 40 years old up", 
            "with eyeglasses",
            
            "gusto na magpakasal", 
            "may bangs", 
            "CENTER_LOGO_SPACE", // The 13th item (Index 12)
            "non-adviser", 
            "may color ang hair",
            
            "trentahin, gusto na ng hilot", 
            "brings more than 2 bags", 
            "can play instrument", 
            "may nanliligaw or nililigawan", 
            "high school teacher",
            
            "iPhone user (fully paid)", 
            "may lesson plan na", 
            "may gadget loan", 
            "elem teacher", 
            "lead teacher"
        ];

        const board = document.getElementById('bimgBoard');
        const cameraInput = document.getElementById('camera-input');
        let activeTile = null;

        // Render the board dynamically
        prompts.forEach((prompt, index) => {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            
            // Check if it is the center tile
            if (index === 12) {
                tile.classList.add('logo-tile');
                // Optional text inside logo tile, leave empty if you just want the logo image
                tile.innerText = ""; 
            } else {
                tile.innerText = prompt;
                
                // Clicking prompts triggers the camera
                tile.addEventListener('click', () => {
                    activeTile = tile;
                    cameraInput.click();
                });
            }
            
            bingoBoard.appendChild(tile);
        });

        // Handle the photo capture and apply as background
        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && activeTile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    activeTile.style.backgroundImage = `url('${event.target.result}')`;
                }
                reader.readAsDataURL(file);
            }
            cameraInput.value = ''; // Reset
        });
    </script>
</body>
</html>
